<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Register</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  <meta name="viewport" content="width=device-width,initial-scale=1">
</head>
<body>
  <div class="container" style="max-width:480px;margin:40px auto;padding:20px;">
    <h1>Create an account</h1>

    <form id="registerForm" action="{{ url_for('register') }}" method="post" autocomplete="on" novalidate>
      <label for="username">Username</label>
      <input id="username" name="username" type="text" required>

      <label for="email">Email</label>
      <input id="email" name="email" type="email" required>

      <label for="password">Password</label>
      <input id="password" name="password" type="password" required>

      <button type="submit" style="margin-top:12px;">Register</button>
    </form>

    <p style="margin-top:12px;">Already have an account? <a href="{{ url_for('login') }}">Log in</a>.</p>
  </div>

  <script>
    document.getElementById('registerForm').addEventListener('submit', function(e){});
  </script>
</body>
</html>
