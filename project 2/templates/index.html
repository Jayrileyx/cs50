{% extends "base.html" %}

{% block title %}Search Groomers{% endblock %}

{% block content %}
    <h2>Find a Dog Groomer in Your City</h2>
    <form action="{{ url_for('search') }}" method="get">
        <label for="city">Enter your city:</label>
        <input type="text" id="city" name="city" required>
        <button type="submit">Search</button>
    </form>

  <div id="results"></div>

  <script>
    document.getElementById('search-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const city = document.getElementById('city').value;
      const res = await fetch(`/search?city=${encodeURIComponent(city)}`);
      const data = await res.json();

      const resultsDiv = document.getElementById('results');
      resultsDiv.innerHTML = '';

      if (data.length === 0) {
        resultsDiv.innerHTML = '<p>No groomers found.</p>';
      } else {
        data.forEach(groomer => {
          const div = document.createElement('div');
          div.className = 'groomer';
          div.innerHTML = `
            <h3>${groomer.name}</h3>
            <p><strong>Address:</strong> ${groomer.address}</p>
            <p><strong>Phone:</strong> ${groomer.phone}</p>
            <p><strong>Rating:</strong> ${groomer.rating}</p>
          `;
          resultsDiv.appendChild(div);
        });
      }
    });
  </script>
{% endblock %}
