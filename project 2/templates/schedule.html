<!DOCTYPE html>
<html>
<head>
    <title>Schedule Appointment</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div class="container">
        <h2>Book an Appointment with {{ groomer.name }}</h2>

        {% if available_slots %}
        <form method="POST" action="{{ url_for('book_appointment') }}">
            <input type="hidden" name="groomer_id" value="{{ groomer_id }}">
            <label for="slot">Choose a time:</label>
            <select name="slot_id" id="slot" required>
                {% for slot in available_slots %}
                    <option value="{{ slot.id }}">{{ slot.time }}</option>
                {% endfor %}
            </select>
            <button type="submit">Book</button>
        </form>
        {% else %}
            <p>No available appointments at this time.</p>
        {% endif %}
    </div>
</body>
</html>
