{% extends "base.html" %}
{% block content %}
<h2>Reschedule Appointment</h2>
<form method="POST">
  <label for="date">Date:</label>
  <input type="date" name="date" required value="{{ appointment.date }}"><br><br>

  <label for="time">Time:</label>
  <select name="time" required>
    {% for hour in range(8, 18) %}
      {% for minute in [0, 30] %}
        {% set t = "%02d:%02d" % (hour, minute) %}
        <option value="{{ t }}" {% if appointment.time == t %}selected{% endif %}>{{ t }}</option>
      {% endfor %}
    {% endfor %}
  </select><br><br>

  <button type="submit" class="btn btn-primary">Save</button>
  <a href="{{ url_for('appointments') }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
