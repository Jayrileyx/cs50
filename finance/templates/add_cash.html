{% extends "layout.html" %}

{% block title %}Add Cash{% endblock %}

{% block main %}
    <h2>Add Cash</h2>
    <form action="/add_cash" method="post">
        <div class="form-group">
            <label for="cash">Amount to Add ($):</label>
            <input class="form-control" type="number" step="0.01" min="0.01" name="cash" id="cash" placeholder="Enter amount" required>
        </div>
        <button class="btn btn-primary" type="submit">Add Cash</button>
    </form>
{% endblock %}
